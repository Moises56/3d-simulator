<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="space" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0b1430"/>
      <stop offset="100%" stop-color="#03040a"/>
    </radialGradient>
    <radialGradient id="planet" cx="38%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#7fe0ff"/>
      <stop offset="45%" stop-color="#2f8fd6"/>
      <stop offset="100%" stop-color="#103a6b"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b48bff"/>
      <stop offset="50%" stop-color="#6cc8ff"/>
      <stop offset="100%" stop-color="#b48bff"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="1.1"/></filter>
  </defs>

  <!-- fondo -->
  <rect width="64" height="64" rx="14" fill="url(#space)"/>

  <!-- estrellas -->
  <g fill="#fff">
    <circle cx="12" cy="14" r="1"/>
    <circle cx="52" cy="12" r="1.3"/>
    <circle cx="55" cy="40" r="0.9"/>
    <circle cx="9" cy="46" r="1"/>
    <circle cx="48" cy="53" r="1.1"/>
  </g>

  <!-- planeta (mundo de lagos) -->
  <circle cx="32" cy="32" r="17" fill="url(#planet)"/>
  <!-- lagos / agua brillante -->
  <g fill="#d8f6ff" opacity="0.85">
    <ellipse cx="26" cy="27" rx="5" ry="3" transform="rotate(-18 26 27)"/>
    <ellipse cx="37" cy="36" rx="4" ry="2.4" transform="rotate(22 37 36)"/>
    <ellipse cx="30" cy="39" rx="2.4" ry="1.5"/>
  </g>
  <!-- brillo de borde -->
  <circle cx="32" cy="32" r="17" fill="none" stroke="#bfefff" stroke-width="1" opacity="0.5" filter="url(#glow)"/>

  <!-- anillo -->
  <ellipse cx="32" cy="32" rx="27" ry="8" fill="none" stroke="url(#ring)" stroke-width="2.4"
           transform="rotate(-24 32 32)" opacity="0.9"/>
</svg>
